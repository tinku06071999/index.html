<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Only For You ❤️</title>
<style>
body {
   margin: 0;
   padding: 0;
   height: 100vh;
   background: linear-gradient(135deg, #ff9a9e, #fad0c4);
   display: flex;
   justify-content: center;
   align-items: center;
   font-family: -apple-system, BlinkMacSystemFont, sans-serif;
   overflow: hidden;
   text-align: center;
}
.container {
   position: relative;
   width: 100%;
   max-width: 400px;
}
h1 {
   color: #fff;
   margin-bottom: 40px;
   font-size: 24px;
}
button {
   padding: 12px 25px;
   font-size: 18px;
   border: none;
   border-radius: 30px;
   cursor: pointer;
   transition: 0.3s;
   position: absolute;
}
#yesBtn {
   background: #28a745;
   color: white;
   left: 25%;
   top: 120px;
}
#noBtn {
   background: #dc3545;
   color: white;
   left: 55%;
   top: 120px;
}
#message {
   display: none;
   margin-top: 150px;
   font-size: 18px;
   color: white;
   padding: 15px;
}
</style>
</head>
<body>
<div class="container">
<h1>Do You Love Me? 😏❤️</h1>
<button id="yesBtn" onclick="showLove()">YES 😍</button>
<button id="noBtn">NO 😜</button>
<div id="message">
<p>😌 I knew it!</p>
<p>Even when you're angry...</p>
<p>You are still my favorite human 💕</p>
<p>If I made you upset, I'm really sorry 🥺</p>
<p>I miss you more than food misses salt 😭</p>
<p>Your smile = My peace</p>
<h2>💖 I LOVE YOU SO MUCH 💖</h2>
<p>Now say it back 😏❤️</p>
</div>
</div>
<script>
const noBtn = document.getElementById("noBtn");
function moveButton() {
   const container = document.querySelector(".container");
   const maxX = container.clientWidth - noBtn.offsetWidth;
   const maxY = 250;
   const randomX = Math.random() * maxX;
   const randomY = Math.random() * maxY;
   noBtn.style.left = randomX + "px";
   noBtn.style.top = randomY + "px";
}
// Works for mobile touch + desktop hover
noBtn.addEventListener("touchstart", moveButton);
noBtn.addEventListener("mouseover", moveButton);
function showLove() {
   document.getElementById("yesBtn").style.display = "none";
   document.getElementById("noBtn").style.display = "none";
   document.getElementById("message").style.display = "block";
}
</script>
</body>
</html>
